{
  "data": {
    "h5_path": "dataset/data.h5",
    "metadata_path": "dataset/metadata.parquet",
    "crop_buffer": true,
    "input_fields": [
      "mask",
      "heat_source"
    ],
    "target_fields": [
      "velocity",
      "temperature",
      "pressure"
    ],
    "max_samples": null,
    "cache_dir": "dataset/cache",
    "split": "canonical"
  },
  "training": {
    "epochs": 100,
    "batch_size": 4,
    "lr": 0.001,
    "weight_decay": 1e-05,
    "scheduler": "cosine",
    "num_workers": 4,
    "seed": 42,
    "amp": true,
    "checkpoint_every": 20,
    "patience": 20,
    "min_delta": 0.0,
    "output_dir": "results/task_a_unet3d"
  },
  "task": "field_prediction",
  "model": "unet3d",
  "model_args": {
    "in_channels": 2,
    "out_channels": 5,
    "scalar_dim": 5,
    "features": [
      32,
      64,
      128,
      256
    ]
  }
}