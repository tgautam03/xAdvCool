data:
  # Single file or list of shards: ["dataset/water.h5", "dataset/air.h5"]
  # Also supports glob: "dataset/shards/*.h5"
  h5_path: dataset/data.h5
  metadata_path: dataset/metadata.parquet
  crop_buffer: true
  input_fields: [mask, heat_source]
  target_fields: [velocity, temperature, pressure]
  # Set to subsample training set (null = use all). Useful for prototyping.
  max_samples: null
  cache_dir: dataset/cache

training:
  epochs: 100
  batch_size: 4
  lr: 1.0e-3
  weight_decay: 1.0e-5
  scheduler: cosine
  num_workers: 4
  seed: 42
  amp: true
  checkpoint_every: 20
  patience: 20
  min_delta: 0.0
