# Task B: Geometry-only field prediction with DeepONet (uniform heat source)
task: field_prediction
model: deeponet

data:
  split: geometry_only
  heat_source_type: uniform
  input_fields: [mask]
  target_fields: [velocity, temperature, pressure]
  cache_dir: dataset/cache_task_b

model_args:
  in_channels: 1
  out_channels: 5
  scalar_dim: 5
  latent_dim: 128

training:
  output_dir: results/task_b_deeponet
  epochs: 100
  batch_size: 32
  lr: 1.0e-3
