# Task B: Geometry-only field prediction with FNO-3D (uniform heat source)
task: field_prediction
model: fno3d

data:
  split: geometry_only
  heat_source_type: uniform
  input_fields: [mask]
  target_fields: [velocity, temperature, pressure]
  cache_dir: dataset/cache_task_b

model_args:
  in_channels: 1
  out_channels: 5
  scalar_dim: 5
  width: 32
  modes: [12, 12, 8]
  n_layers: 4

training:
  output_dir: results/task_b_fno3d
  epochs: 100
  batch_size: 8
  lr: 1.0e-3
