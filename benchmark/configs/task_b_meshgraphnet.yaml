# Task B: Geometry-only field prediction with MeshGraphNet (uniform heat source)
task: field_prediction
model: meshgraphnet

data:
  split: geometry_only
  heat_source_type: uniform
  input_fields: [mask]
  target_fields: [velocity, temperature, pressure]
  cache_dir: dataset/cache_task_b

model_args:
  in_channels: 1
  out_channels: 5
  scalar_dim: 5
  hidden_dim: 128
  n_layers: 6
  subsample_factor: 4

training:
  output_dir: results/task_b_meshgraphnet
  epochs: 100
  batch_size: 8
  lr: 1.0e-3
