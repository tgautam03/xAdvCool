# Task B: Geometry-only field prediction with MLPBaseline (uniform heat source)
task: field_prediction
model: mlp_baseline

data:
  split: geometry_only
  heat_source_type: uniform
  input_fields: [mask]
  target_fields: [velocity, temperature, pressure]
  cache_dir: dataset/cache_task_b

model_args:
  in_channels: 1
  out_channels: 5
  scalar_dim: 5
  hidden_dim: 256

training:
  output_dir: results/task_b_mlp_baseline
  epochs: 50
  batch_size: 16
