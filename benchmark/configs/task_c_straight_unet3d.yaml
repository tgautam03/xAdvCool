# Task C: OOD generalization — hold out Straight Channels, test with U-Net
task: field_prediction
model: unet3d

data:
  split: ood_Straight_Channels

model_args:
  in_channels: 2
  out_channels: 5
  scalar_dim: 5
  features: [32, 64, 128, 256]

training:
  output_dir: results/task_c_straight_unet3d
  epochs: 100
  batch_size: 4
  lr: 1.0e-3
