# Task A: Full-input field prediction with FNO-3D
task: field_prediction
model: fno3d

data:
  split: canonical

model_args:
  in_channels: 2
  out_channels: 5
  scalar_dim: 5
  width: 32
  modes: [12, 12, 8]
  n_layers: 4

training:
  output_dir: results/task_a_fno3d
  epochs: 100
  batch_size: 2
  lr: 1.0e-3
