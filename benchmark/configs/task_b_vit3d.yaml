# Task B: Geometry-only field prediction with 3D Vision Transformer (uniform heat source)
task: field_prediction
model: vit3d

data:
  split: geometry_only
  heat_source_type: uniform
  input_fields: [mask]
  target_fields: [velocity, temperature, pressure]
  cache_dir: dataset/cache_task_b

model_args:
  in_channels: 1
  out_channels: 5
  scalar_dim: 5
  patch_size: [8, 8, 8]
  embed_dim: 256
  depth: 8
  n_heads: 8
  dropout: 0.1

training:
  output_dir: results/task_b_vit3d
  epochs: 100
  batch_size: 16
  lr: 5.0e-4
