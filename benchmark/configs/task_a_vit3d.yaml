# Task A: Full-input field prediction with 3D Vision Transformer
task: field_prediction
model: vit3d

data:
  split: canonical

model_args:
  in_channels: 2
  out_channels: 5
  scalar_dim: 5
  patch_size: [8, 8, 8]
  embed_dim: 256
  depth: 8
  n_heads: 8
  dropout: 0.1

training:
  output_dir: results/task_a_vit3d
  epochs: 100
  batch_size: 16
  lr: 5.0e-4
